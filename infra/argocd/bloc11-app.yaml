apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bloc11-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: http://gitea:3000/admin/bloc11-app.git
    targetRevision: main
    path: deploy
  destination:
    server: https://kubernetes.default.svc
    namespace: bloc11
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
