apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bloc4-app
  namespace: argocd
spec:
  project: default
  source:
    # Le dépôt est joignable depuis le cluster car le conteneur Gitea est
    # attaché au réseau "kind" (cf. infra/gitea/compose.yaml).
    repoURL: http://gitea:3000/admin/bloc4-app.git
    targetRevision: main
    path: deploy
  destination:
    server: https://kubernetes.default.svc
    namespace: bloc4
  syncPolicy:
    automated:
      prune: true      # supprime ce qui n'est plus dans Git
      selfHeal: true   # corrige toute dérive manuelle du cluster
    syncOptions:
      - CreateNamespace=true
