# Config utilisateur des registres (remplace /etc/containers/registries.conf).
unqualified-search-registries = ["docker.io"]

# Registre Gitea local (bloc 4) : HTTP, donc déclaré "insecure".
[[registry]]
location = "gitea:3000"
insecure = true

[[registry]]
location = "localhost:3000"
insecure = true
