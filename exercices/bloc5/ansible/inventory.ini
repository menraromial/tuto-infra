# Les cibles ne sont pas des VMs distantes mais des conteneurs Podman locaux :
# le plugin "containers.podman.podman" remplace SSH par "podman exec".
# Avec de vraies machines, seules ces lignes changeraient (IP + SSH).
[web]
srv1 http_port=8081
srv2 http_port=8082

[web:vars]
ansible_connection=containers.podman.podman
