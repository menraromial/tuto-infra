apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: bloc3
data:
  POSTGRES_DB: demo
  POSTGRES_USER: demo
---
# En vrai on ne versionne JAMAIS un Secret en clair : ici c'est un lab local.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: bloc3
stringData:
  POSTGRES_PASSWORD: demo-password
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: bloc3
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: docker.io/library/postgres:17-alpine
          envFrom:
            - configMapRef:
                name: postgres-config
            - secretRef:
                name: postgres-secret
          ports:
            - containerPort: 5432
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "demo"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: bloc3
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
